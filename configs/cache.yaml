# Cache Configuration
cache:
  type: ${CACHE_TYPE:redis}  # redis, memory
  redis:
    address: "${REDIS_HOST:localhost}:${REDIS_PORT:6379}"
    password: ${REDIS_PASSWORD:}
    db: ${REDIS_DB:0}
    pool_size: ${REDIS_POOL_SIZE:10}
    min_idle_conns: ${REDIS_MIN_IDLE_CONNS:2}
    dial_timeout: ${REDIS_DIAL_TIMEOUT:5s}
    read_timeout: ${REDIS_READ_TIMEOUT:3s}
    write_timeout: ${REDIS_WRITE_TIMEOUT:3s}
  memory:
    max_size: ${CACHE_MEMORY_MAX_SIZE:100}  # MB
    max_entries: ${CACHE_MEMORY_MAX_ENTRIES:10000}
    ttl: ${CACHE_MEMORY_TTL:300s}  # default TTL for memory cache
