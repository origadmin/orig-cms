# Security Configuration
security:
  cors:
    enabled: ${CORS_ENABLED:true}
    allowed_origins:
      - "${CORS_ALLOWED_ORIGINS:*}"
    allowed_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "PATCH"
      - "OPTIONS"
    allowed_headers:
      - "*"
    exposed_headers:
      - "Content-Disposition"
    allow_credentials: ${CORS_ALLOW_CREDENTIALS:true}
    max_age: ${CORS_MAX_AGE:86400}
  csrf:
    enabled: ${CSRF_ENABLED:false}
    token_length: ${CSRF_TOKEN_LENGTH:32}
  rate_limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    default_limit: ${RATE_LIMIT_DEFAULT:100}
    default_window: ${RATE_LIMIT_WINDOW:60s}
  cors_by_service:
    gateway:
      enabled: true
      allowed_origins:
        - "http://localhost:3000"
        - "http://localhost:8000"
    api:
      enabled: false
