# Object Storage Configuration
objectstore:
  type: ${OBJECTSTORE_TYPE:local}  # local, s3, minio, oss
  local:
    base_path: ${OBJECTSTORE_LOCAL_PATH:./data/media}
    max_file_size: ${OBJECTSTORE_LOCAL_MAX_FILE_SIZE:524288000}  # 500MB
  s3:
    endpoint: ${OBJECTSTORE_S3_ENDPOINT:}
    region: ${OBJECTSTORE_S3_REGION:us-east-1}
    bucket: ${OBJECTSTORE_S3_BUCKET:orig-cms-media}
    access_key: ${OBJECTSTORE_S3_ACCESS_KEY:}
    secret_key: ${OBJECTSTORE_S3_SECRET_KEY:}
    force_path_style: ${OBJECTSTORE_S3_FORCE_PATH_STYLE:false}
    use_ssl: ${OBJECTSTORE_S3_USE_SSL:false}
  minio:
    endpoint: ${OBJECTSTORE_MINIO_ENDPOINT:localhost:9000}
    region: ${OBJECTSTORE_MINIO_REGION:us-east-1}
    bucket: ${OBJECTSTORE_MINIO_BUCKET:orig-cms-media}
    access_key: ${OBJECTSTORE_MINIO_ACCESS_KEY:minioadmin}
    secret_key: ${OBJECTSTORE_MINIO_SECRET_KEY:minioadmin}
    use_ssl: ${OBJECTSTORE_MINIO_USE_SSL:false}
  allowed_extensions:
    - ".mp4"
    - ".avi"
    - ".mov"
    - ".mkv"
    - ".webm"
    - ".flv"
    - ".wmv"
    - ".mp3"
    - ".wav"
    - ".flac"
    - ".jpg"
    - ".jpeg"
    - ".png"
    - ".gif"
    - ".webp"
    - ".svg"
