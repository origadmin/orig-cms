// Like Service
service LikeService {
  rpc ToggleLike(ToggleLikeRequest) returns (ToggleLikeResponse) {
    option (google.api.http) = {
      post: "/api/v1/likes/toggle"
      body: "*"
    };
  }
  rpc GetMediaLikes(GetMediaLikesRequest) returns (GetMediaLikesResponse) {
    option (google.api.http) = {get: "/api/v1/medias/{media_id}/likes"};
  }
  rpc GetUserLikes(GetUserLikesRequest) returns (GetUserLikesResponse) {
    option (google.api.http) = {get: "/api/v1/users/{user_id}/likes"};
  }
}

message ToggleLikeRequest {
  int64 user_id = 1 [json_name = "user_id"];
  int64 media_id = 2 [json_name = "media_id"];
  string type = 3 [json_name = "type"];
}

message ToggleLikeResponse {
  bool liked = 1 [json_name = "liked"];
  int64 like_count = 2 [json_name = "like_count"];
}

message GetMediaLikesRequest {
  int64 media_id = 1;
}

message GetMediaLikesResponse {
  int64 like_count = 1 [json_name = "like_count"];
  int64 dislike_count = 2 [json_name = "dislike_count"];
}

message GetUserLikesRequest {
  int64 user_id = 1;
}

message GetUserLikesResponse {
  repeated api.v1.services.types.Like likes = 1 [json_name = "likes"];
}

