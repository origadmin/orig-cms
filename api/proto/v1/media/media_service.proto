syntax = "proto3";

package api.v1.services.media;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/field_mask.proto";
import "v1/types/media.proto";

option go_package = "origadmin/application/origcms/api/gen/v1/media;media";
option java_multiple_files = true;
option java_outer_classname = "OrigCMSServiceMediaProto";
option java_package = "com.origcms.api.v1.services.media";
option objc_class_prefix = "OrigCMSMedia";

// The media service definition.
service MediaService {
  // ListMedias returns a list of medias.
  rpc ListMedias(ListMediasRequest) returns (ListMediasResponse) {
    option (google.api.http) = {get: "/api/v1/medias"};
  }

  // GetMedia returns a media by ID.
  rpc GetMedia(GetMediaRequest) returns (GetMediaResponse) {
    option (google.api.http) = {get: "/api/v1/medias/{id}"};
  }

  // CreateMedia creates a new media.
  rpc CreateMedia(CreateMediaRequest) returns (CreateMediaResponse) {
    option (google.api.http) = {
      post: "/api/v1/medias"
      body: "*"
    };
  }

  // UpdateMedia updates an existing media.
  rpc UpdateMedia(UpdateMediaRequest) returns (UpdateMediaResponse) {
    option (google.api.http) = {
      put: "/api/v1/medias/{media.id}"
      body: "*"
    };
  }

  // DeleteMedia deletes a media.
  rpc DeleteMedia(DeleteMediaRequest) returns (DeleteMediaResponse) {
    option (google.api.http) = {delete: "/api/v1/medias/{id}"};
  }

  // IncrementViewCount increments the view count of a media.
  rpc IncrementViewCount(IncrementViewCountRequest) returns (IncrementViewCountResponse) {
    option (google.api.http) = {
      post: "/api/v1/medias/{id}/view"
      body: "*"
    };
  }

  // UploadMedia uploads a media file.
  // Note: For large files, standard HTTP multipart is preferred over gRPC in the gateway.
  rpc UploadMedia(UploadMediaRequest) returns (UploadMediaResponse) {
    option (google.api.http) = {
      post: "/api/v1/medias/upload"
      body: "*"
    };
  }

  // ListEncodingTasks returns a list of encoding tasks for a media.
  rpc ListEncodingTasks(ListEncodingTasksRequest) returns (ListEncodingTasksResponse) {
    option (google.api.http) = {get: "/api/v1/medias/{media_id}/tasks"};
  }

  // GetTranscodingStatus returns the overall transcoding status of the system.
  rpc GetTranscodingStatus(GetTranscodingStatusRequest) returns (GetTranscodingStatusResponse) {
    option (google.api.http) = {get: "/api/v1/medias/transcoding/status"};
  }

  // ListEncodeProfiles returns a list of encoding profiles.
  rpc ListEncodeProfiles(ListEncodeProfilesRequest) returns (ListEncodeProfilesResponse) {
    option (google.api.http) = {get: "/api/v1/media/profiles"};
  }

  // GetEncodeProfile returns an encoding profile by ID.
  rpc GetEncodeProfile(GetEncodeProfileRequest) returns (GetEncodeProfileResponse) {
    option (google.api.http) = {get: "/api/v1/media/profiles/{id}"};
  }

  // CreateEncodeProfile creates a new encoding profile.
  rpc CreateEncodeProfile(CreateEncodeProfileRequest) returns (CreateEncodeProfileResponse) {
    option (google.api.http) = {
      post: "/api/v1/media/profiles"
      body: "*"
    };
  }

  // UpdateEncodeProfile updates an existing encoding profile.
  rpc UpdateEncodeProfile(UpdateEncodeProfileRequest) returns (UpdateEncodeProfileResponse) {
    option (google.api.http) = {
      put: "/api/v1/media/profiles/{profile.id}"
      body: "*"
    };
  }

  // DeleteEncodeProfile deletes an encoding profile.
  rpc DeleteEncodeProfile(DeleteEncodeProfileRequest) returns (DeleteEncodeProfileResponse) {
    option (google.api.http) = {delete: "/api/v1/media/profiles/{id}"};
  }
}

// ListMediasRequest is the request message for listing medias.
message ListMediasRequest {
  int32 page = 1 [json_name = "page"];
  int32 page_size = 2 [json_name = "page_size"];
  string page_token = 3 [json_name = "page_token"];
  string keyword = 4 [json_name = "keyword"];
  optional int32 type = 5 [json_name = "type"];
  optional int32 status = 6 [json_name = "status"];
  optional int64 category_id = 7 [json_name = "category_id"];
  optional int64 user_id = 8 [json_name = "user_id"];
  string order_by = 9 [json_name = "order_by"];
  bool descending = 10 [json_name = "descending"];
}

// ListMediasResponse is the response message for listing medias.
message ListMediasResponse {
  int32 total = 1 [json_name = "total"];
  repeated api.v1.services.types.Media medias = 2 [json_name = "medias"];
  int32 page = 3 [json_name = "page"];
  int32 page_size = 4 [json_name = "page_size"];
  string next_page_token = 5 [json_name = "next_page_token"];
}

// GetMediaRequest is the request message for getting a media.
message GetMediaRequest {
  int64 id = 1;
}

// GetMediaResponse is the response message for getting a media.
message GetMediaResponse {
  api.v1.services.types.Media media = 1 [json_name = "media"];
}

// CreateMediaRequest is the request message for creating a media.
message CreateMediaRequest {
  api.v1.services.types.Media media = 1;
}

// CreateMediaResponse is the response message for creating a media.
message CreateMediaResponse {
  api.v1.services.types.Media media = 1 [json_name = "media"];
}

// UpdateMediaRequest is the request message for updating a media.
message UpdateMediaRequest {
  api.v1.services.types.Media media = 1 [json_name = "media"];
  google.protobuf.FieldMask update_mask = 2 [json_name = "update_mask"];
}

// UpdateMediaResponse is the response message for updating a media.
message UpdateMediaResponse {
  api.v1.services.types.Media media = 1 [json_name = "media"];
}

// DeleteMediaRequest is the request message for deleting a media.
message DeleteMediaRequest {
  int64 id = 1;
}

// DeleteMediaResponse is the response message for deleting a media.
message DeleteMediaResponse {
  google.protobuf.Empty empty = 1 [json_name = "empty"];
}

// IncrementViewCountRequest is the request message for incrementing view count.
message IncrementViewCountRequest {
  int64 id = 1;
}

// IncrementViewCountResponse is the response message for incrementing view count.
message IncrementViewCountResponse {
  int64 view_count = 1 [json_name = "view_count"];
}

// UploadMediaRequest is the request message for uploading a media file.
message UploadMediaRequest {
  // The file title.
  string title = 1 [json_name = "title"];
  // The file description.
  string description = 2 [json_name = "description"];
  // The file type (video, image, audio).
  string type = 3 [json_name = "type"];
  // The file path on the server (set by server after upload).
  string file_path = 4 [json_name = "file_path"];
  // The file size in bytes.
  int64 size = 5 [json_name = "size"];
  // The media duration in seconds (for video/audio).
  int32 duration = 6 [json_name = "duration"];
  // The user ID who uploaded the file.
  int64 user_id = 7 [json_name = "user_id"];
}

// UploadMediaResponse is the response message for uploading a media file.
message UploadMediaResponse {
  api.v1.services.types.Media media = 1 [json_name = "media"];
}

