// Playlist Service
service PlaylistService {
  rpc GetPlaylists(GetPlaylistsRequest) returns (GetPlaylistsResponse) {
    option (google.api.http) = {get: "/api/v1/playlists"};
  }
  rpc GetPlaylist(GetPlaylistRequest) returns (GetPlaylistResponse) {
    option (google.api.http) = {get: "/api/v1/playlists/{id}"};
  }
  rpc CreatePlaylist(CreatePlaylistRequest) returns (CreatePlaylistResponse) {
    option (google.api.http) = {
      post: "/api/v1/playlists"
      body: "*"
    };
  }
  rpc UpdatePlaylist(UpdatePlaylistRequest) returns (UpdatePlaylistResponse) {
    option (google.api.http) = {
      put: "/api/v1/playlists/{playlist.id}"
      body: "*"
    };
  }
  rpc DeletePlaylist(DeletePlaylistRequest) returns (DeletePlaylistResponse) {
    option (google.api.http) = {delete: "/api/v1/playlists/{id}"};
  }
  rpc AddToPlaylist(AddToPlaylistRequest) returns (AddToPlaylistResponse) {
    option (google.api.http) = {
      post: "/api/v1/playlists/{playlist_id}/add"
      body: "*"
    };
  }
  rpc RemoveFromPlaylist(RemoveFromPlaylistRequest) returns (RemoveFromPlaylistResponse) {
    option (google.api.http) = {
      post: "/api/v1/playlists/{playlist_id}/remove"
      body: "*"
    };
  }
}

message GetPlaylistsRequest {
  int64 user_id = 1 [json_name = "user_id"];
  optional bool is_public = 2 [json_name = "is_public"];
  int32 page = 3 [json_name = "page"];
  int32 page_size = 4 [json_name = "page_size"];
}

message GetPlaylistsResponse {
  int32 total = 1 [json_name = "total"];
  repeated api.v1.services.types.Playlist playlists = 2 [json_name = "playlists"];
}

message GetPlaylistRequest {
  int64 id = 1;
}

message GetPlaylistResponse {
  api.v1.services.types.Playlist playlist = 1 [json_name = "playlist"];
  repeated api.v1.services.types.Media medias = 2 [json_name = "medias"];
}

message CreatePlaylistRequest {
  api.v1.services.types.Playlist playlist = 1;
}

message CreatePlaylistResponse {
  api.v1.services.types.Playlist playlist = 1 [json_name = "playlist"];
}

message UpdatePlaylistRequest {
  api.v1.services.types.Playlist playlist = 1 [json_name = "playlist"];
  google.protobuf.FieldMask update_mask = 2 [json_name = "update_mask"];
}

message UpdatePlaylistResponse {
  api.v1.services.types.Playlist playlist = 1 [json_name = "playlist"];
}

message DeletePlaylistRequest {
  int64 id = 1;
}

message DeletePlaylistResponse {
  google.protobuf.Empty empty = 1 [json_name = "empty"];
}

message AddToPlaylistRequest {
  int64 playlist_id = 1 [json_name = "playlist_id"];
  int64 media_id = 2 [json_name = "media_id"];
}

message AddToPlaylistResponse {
  int64 media_count = 1 [json_name = "media_count"];
}

message RemoveFromPlaylistRequest {
  int64 playlist_id = 1 [json_name = "playlist_id"];
  int64 media_id = 2 [json_name = "media_id"];
}

message RemoveFromPlaylistResponse {
  int64 media_count = 1 [json_name = "media_count"];
}

message ListEncodingTasksRequest {
  int64 media_id = 1 [json_name = "media_id"];
}

message ListEncodingTasksResponse {
  repeated api.v1.services.types.EncodingTask tasks = 1 [json_name = "tasks"];
}

message GetTranscodingStatusRequest {
  optional int64 user_id = 1 [json_name = "user_id"];
}

message GetTranscodingStatusResponse {
  int32 processing_count = 1 [json_name = "processing_count"];
  int32 pending_count = 2 [json_name = "pending_count"];
  int32 failed_count = 3 [json_name = "failed_count"];
  int32 success_count = 4 [json_name = "success_count"];
  // List of media items with their encoding tasks
  repeated TranscodingMediaItem items = 5 [json_name = "items"];
}

// TranscodingMediaItem contains media info and its encoding tasks
message TranscodingMediaItem {
  api.v1.services.types.Media media = 1 [json_name = "media"];
  repeated api.v1.services.types.EncodingTask tasks = 2 [json_name = "tasks"];
}

