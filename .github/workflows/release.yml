name: Release

on:
  push:
    tags:
      - 'v*' # Push events matching v1.0, v20.15.10, etc.
  workflow_dispatch:
    # Allow manual triggering of the workflow
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true

env:
  GO_VERSION: '1.23'
  REPO_OWNER: ${{ github.repository_owner }}
  REPO_NAME: orig-cms

jobs:
  goreleaser:
    if: github.repository != 'origadmin/orig-cms'
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN || github.token }}

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          version: latest
          args: release --rm-dist
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}

  notify:
    if: always() && github.repository != 'origadmin/orig-cms'
    name: Notify
    needs: [ goreleaser ]
    runs-on: ubuntu-latest
    steps:
      - name: Check if release succeeded
        if: success()
        run: |
          echo "Release was successful!"

      - name: Check if release failed
        if: failure()
        run: |
          echo "Release failed!"
